<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Export Viewer</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <header id="app-header">
    <span class="app-title">&#x1F916; Grok Export Viewer</span>
    <div class="header-controls">
      <input type="text" id="search-input" placeholder="Search conversations..." aria-label="Search conversations">
      <button id="open-folder-btn">&#x1F4C2; Open Folder</button>
    </div>
  </header>

  <div id="app-body">
    <aside id="sidebar">
      <div id="sidebar-conversations">
        <div class="sidebar-section-label">
          Conversations <span id="conv-count"></span>
        </div>
        <ul id="conv-list" role="listbox" aria-label="Conversations"></ul>
      </div>
      <div id="sidebar-folders">
        <div class="sidebar-section-label">UUID Folders</div>
        <ul id="folder-list" role="listbox" aria-label="UUID Folders"></ul>
      </div>
    </aside>

    <main id="chat-panel">
      <div id="welcome-screen">
        <div class="welcome-icon">&#x1F916;</div>
        <h2>Grok Export Viewer</h2>
        <p>Open your Grok data export folder to browse conversations, images, and files.</p>
        <button id="welcome-open-btn">&#x1F4C2; Open Grok Export Folder</button>
        <p class="browser-note">Requires Chrome or Edge &mdash; uses the File System Access API.</p>
      </div>
      <div id="chat-header" hidden></div>
      <div id="chat-messages" hidden></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
